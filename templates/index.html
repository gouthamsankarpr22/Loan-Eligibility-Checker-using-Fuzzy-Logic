<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuzzy Loan Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- ================= Sidebar ================= -->
<div class="sidebar">
    <h3>Dashboard</h3>
    <a href="#" class="active">Home</a>
    <a href="#">Analytics</a>
    <a href="#">Settings</a>
    <button id="darkModeToggle" class="btn-modern" style="margin-top: auto;">Dark/Light Mode</button>
</div>

<!-- ================= Main Content ================= -->
<div class="main">

    <!-- Modern Card -->
    <div class="modern-card">
        <h2 class="title">Loan Approval Simulation</h2>

        <form id="loanform">

            <!-- Sliders -->
            <div class="slider-group">
                <label for="income">Income: <span id="income_val">50000</span></label>
                <input type="range" id="income" min="0" max="200000" value="50000">
            </div>

            <div class="slider-group">
                <label for="credit_score">Credit Score: <span id="credit_val">700</span></label>
                <input type="range" id="credit_score" min="300" max="850" value="700">
            </div>

            <div class="slider-group">
                <label for="debt_ratio">Debt Ratio: <span id="debt_val">0.3</span></label>
                <input type="range" id="debt_ratio" min="0" max="1" step="0.01" value="0.3">
            </div>

            <div class="slider-group">
                <label for="employment">Employment (months): <span id="emp_val">12</span></label>
                <input type="range" id="employment" min="0" max="40" value="12">
            </div>

            <div class="slider-group">
                <label for="existing_loans">Existing Loans: <span id="loan_val">2</span></label>
                <input type="range" id="existing_loans" min="0" max="10" value="2">
            </div>

            <div class="slider-group">
                <label for="age">Age: <span id="age_val">30</span></label>
                <input type="range" id="age" min="18" max="80" value="30">
            </div>

            <button type="submit" class="btn-modern full-width">Check Approval</button>
        </form>

        <!-- Result -->
        <div id="result" class="result-modern"></div>

        <!-- Charts -->
        <canvas id="approvalGauge" width="200" height="100"></canvas>
        <canvas id="fuzzyGraph" width="400" height="200"></canvas>

    </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
